<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#grad)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>

  <!-- Webhook hook shape: a curved hook with an arrowhead -->
  <g fill="none" stroke="#fff" stroke-width="38" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stem -->
    <line x1="256" y1="108" x2="256" y2="270"/>
    <!-- Curved hook bottom -->
    <path d="M256,270 A72,72 0 0,1 184,342 A72,72 0 0,1 184,198"/>
  </g>

  <!-- Arrow tip at the top of the stem -->
  <g fill="none" stroke="#fff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="216,148 256,108 296,148"/>
  </g>

  <!-- Signal / broadcast waves emanating from hook bottom -->
  <g fill="none" stroke="#fff" stroke-linecap="round">
    <path d="M300,342 A56,56 0 0,0 300,286" stroke-width="14" opacity="0.6"/>
    <path d="M340,362 A96,96 0 0,0 340,266" stroke-width="14" opacity="0.38"/>
    <path d="M380,382 A136,136 0 0,0 380,246" stroke-width="14" opacity="0.2"/>
  </g>

  <!-- Small dot at the hook's broadcast origin -->
  <circle cx="258" cy="342" r="18" fill="#fff" opacity="0.85"/>
</svg>
