<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Webhook Catcher</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{background:#0a0a0b;color:#fafafa;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
      .container{text-align:center;padding:2rem;max-width:480px}
      .code{font-size:6rem;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
      h1{font-size:1.5rem;margin:1rem 0 0.5rem;color:#e4e4e7}
      p{color:#71717a;line-height:1.6;margin-bottom:1.5rem}
      a{display:inline-block;padding:0.75rem 2rem;background:#6366f1;color:#fff;border-radius:0.5rem;text-decoration:none;font-weight:500;transition:background 0.2s}
      a:hover{background:#4f46e5}
      @media(max-width:480px){.code{font-size:4rem}h1{font-size:1.25rem}}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Return to Webhook Catcher to continue testing webhooks.</p>
      <a href="/">Go to Webhook Catcher</a>
    </div>
  </body>
</html>
